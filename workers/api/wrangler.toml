name = "1891-interpreter-api"
main = "src/index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# Public route once the subdomain is provisioned. Until then, the worker is
# reachable at https://1891-interpreter-api.<account>.workers.dev — point
# site/assets/js/api.js at whichever URL is live.
# routes = [
#   { pattern = "api.madeby1891.com/*", custom_domain = true }
# ]

[vars]
APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjHVtZ3un9qcA0XOaXsU0EDpk_Dbinsk_UKwKf8DicxkbKWaCdEys7MlcR0pdGDhu0HA/exec"
ALLOWED_ORIGIN = "https://madeby1891.com"

# JWT_SECRET is NOT in this file. Set with:
#   wrangler secret put JWT_SECRET
# Value must match the HMAC_SECRET stored in the Apps Script PropertiesService.

[[durable_objects.bindings]]
name = "JOB_BOARD_ROOM"
class_name = "JobBoardRoom"

[[migrations]]
tag = "v1"
new_classes = ["JobBoardRoom"]

# Stripe webhook idempotency. Every inbound Stripe event.id is recorded here
# with a 7-day TTL so retries are short-circuited per PAYMENTS.md §7.2.
#
# Anthony: create with
#   npx wrangler kv namespace create 1891-interpreter-idempotency
#   npx wrangler kv namespace create 1891-interpreter-idempotency --preview
# and paste the resulting ids below before the next `wrangler deploy`.
[[kv_namespaces]]
binding = "IDEMPOTENCY"
id = "eb7d57a82a514664bab188ad12e13c0a"
preview_id = "7531f980a2ca475c8346f1dee1476960"
