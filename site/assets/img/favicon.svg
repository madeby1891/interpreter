<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="1891 Interpreter">
  <title>1891 Interpreter</title>
  <rect width="64" height="64" rx="13" fill="#0F1419"/>
  <!-- 1891 horizontal — Futura (geometric, matches the house "1891" wordmark) -->
  <g fill="#FAFAF7" font-family="'Futura','Futura PT','Century Gothic',system-ui,sans-serif" font-weight="700" text-anchor="middle">
    <text x="32" y="38" font-size="26" letter-spacing="0.5">1891</text>
  </g>
  <!-- ASL contact-point: arc + dot, calm baseline beneath the wordmark -->
  <path d="M22 50 Q32 44.5 42 50" stroke="#C8553D" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <circle cx="32" cy="47" r="2" fill="#C8553D"/>
</svg>
