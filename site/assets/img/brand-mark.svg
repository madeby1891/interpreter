<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="1891 Interpreter">
  <title>1891 Interpreter</title>
  <desc>1891 wordmark on a dark plate with a warm-bloom ASL contact arc — built in Frederick, carried forward since 1891.</desc>
  <defs>
    <linearGradient id="bm-plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171D24"/>
      <stop offset="1" stop-color="#0A0D11"/>
    </linearGradient>
    <radialGradient id="bm-warm" cx="0.82" cy="0.18" r="0.78">
      <stop offset="0" stop-color="#C8553D" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#C8553D" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#C8553D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bm-glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDF6"/>
      <stop offset="1" stop-color="#E9E3D3"/>
    </linearGradient>
  </defs>

  <!-- Dark plate with subtle warm corner glow -->
  <rect width="64" height="64" rx="14" fill="url(#bm-plate)"/>
  <rect width="64" height="64" rx="14" fill="url(#bm-warm)"/>
  <!-- Hairline inner frame: stamped-medallion feel -->
  <rect x="3.5" y="3.5" width="57" height="57" rx="11" fill="none" stroke="#FAFAF7" stroke-opacity="0.07" stroke-width="0.6"/>

  <!-- "1891" — single horizontal row, bold Futura, centered.
       Tuned for clarity at 16px favicon size. -->
  <g fill="url(#bm-glyph)" font-family="'Futura','Futura PT','Century Gothic',system-ui,sans-serif" font-weight="700" font-size="26" text-anchor="middle">
    <text x="32" y="36" letter-spacing="0.5">1891</text>
  </g>

  <!-- ASL contact-point: a single calm arc with one bloom dot
       sitting on a baseline beneath "1891". Reads as "the contact." -->
  <g class="bm-asl">
    <path d="M22 50 Q32 44.5 42 50" stroke="#C8553D" stroke-width="2.0" fill="none" stroke-linecap="round"/>
    <circle class="bm-contact" cx="32" cy="47" r="1.9" fill="#C8553D"/>
  </g>
</svg>
