<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="1891 Interpreter">
  <title>1891 Interpreter</title>
  <desc>Engraved 1891 monogram with an ASL contact-point arc — fifth generation Deaf since 1891.</desc>
  <defs>
    <!-- Warm-paper texture: subtle noise via overlapping filtered gradients on the dark plate -->
    <linearGradient id="bm-plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161C22"/>
      <stop offset="1" stop-color="#0B0F13"/>
    </linearGradient>
    <radialGradient id="bm-warm" cx="0.78" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#C8553D" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#C8553D" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#C8553D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bm-glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDF6"/>
      <stop offset="1" stop-color="#E9E3D3"/>
    </linearGradient>
    <!-- Etched bevel: a faint dark inner edge sells the engraved feel -->
    <filter id="bm-etch" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.35"/>
      <feOffset dx="0" dy="0.4" result="off"/>
      <feComposite in="SourceGraphic" in2="off" operator="over"/>
    </filter>
  </defs>

  <!-- Dark plate -->
  <rect width="64" height="64" rx="13" fill="url(#bm-plate)"/>
  <!-- Warm-paper bloom in corner -->
  <rect width="64" height="64" rx="13" fill="url(#bm-warm)"/>
  <!-- Hairline inner frame: gives it the stamped-medallion feel -->
  <rect x="3.5" y="3.5" width="57" height="57" rx="10.5" fill="none" stroke="#FAFAF7" stroke-opacity="0.07" stroke-width="0.6"/>

  <!-- 1891 — custom geometric letterforms, two stacked rows, slab-serif weighted -->
  <!-- Row 1: "18" -->
  <g fill="url(#bm-glyph)" filter="url(#bm-etch)">
    <!-- 1: stem with top serif flag and base bar -->
    <path d="M14.6 11.0 L19.4 11.0 L19.4 27.5 L21.9 27.5 L21.9 29.7 L11.7 29.7 L11.7 27.5 L14.6 27.5 L14.6 14.0 L11.9 15.2 L11.9 12.8 Z"/>
    <!-- 8: figure-eight in two stacked rings, drawn as a single path with even-odd cutouts -->
    <path fill-rule="evenodd" d="M28.7 10.6 C33.2 10.6 36.1 12.6 36.1 15.6 C36.1 17.6 34.9 19.0 32.9 19.7 C35.4 20.4 36.7 22.1 36.7 24.4 C36.7 27.8 33.6 30.0 28.7 30.0 C23.8 30.0 20.7 27.8 20.7 24.4 C20.7 22.1 22.0 20.4 24.5 19.7 C22.5 19.0 21.3 17.6 21.3 15.6 C21.3 12.6 24.2 10.6 28.7 10.6 Z M28.7 13.0 C26.9 13.0 25.8 14.0 25.8 15.7 C25.8 17.3 26.9 18.4 28.7 18.4 C30.5 18.4 31.6 17.3 31.6 15.7 C31.6 14.0 30.5 13.0 28.7 13.0 Z M28.7 20.8 C26.6 20.8 25.3 22.1 25.3 24.1 C25.3 26.2 26.6 27.6 28.7 27.6 C30.8 27.6 32.1 26.2 32.1 24.1 C32.1 22.1 30.8 20.8 28.7 20.8 Z"/>
  </g>

  <!-- Row 2: "91" -->
  <g fill="url(#bm-glyph)" filter="url(#bm-etch)">
    <!-- 9: mirror of 6 — top ring with descending tail -->
    <path fill-rule="evenodd" d="M35.9 34.3 C40.7 34.3 43.6 37.5 43.6 43.4 C43.6 49.7 40.4 53.4 35.0 53.4 C32.6 53.4 30.7 52.8 29.3 51.9 L30.7 49.6 C31.8 50.4 33.1 50.8 34.7 50.8 C37.7 50.8 39.3 48.9 39.5 45.4 C38.3 46.5 36.8 47.1 35.0 47.1 C31.3 47.1 28.7 44.6 28.7 40.8 C28.7 36.9 31.5 34.3 35.9 34.3 Z M35.8 36.7 C33.7 36.7 32.4 38.3 32.4 40.6 C32.4 42.9 33.7 44.4 35.8 44.4 C37.9 44.4 39.3 42.9 39.3 40.6 C39.3 38.3 37.9 36.7 35.8 36.7 Z"/>
    <!-- 1: stem with top serif flag and base bar -->
    <path d="M48.1 34.6 L52.9 34.6 L52.9 51.1 L55.4 51.1 L55.4 53.3 L45.2 53.3 L45.2 51.1 L48.1 51.1 L48.1 37.6 L45.4 38.8 L45.4 36.4 Z"/>
  </g>

  <!-- ASL contact-point: the brand DNA. Two finger-pad dots meeting at an arc.
       The arc is the "contact" between signer and receiver — fifth-generation Deaf since 1891. -->
  <g class="bm-asl">
    <!-- Soft bloom halo behind the contact point -->
    <circle cx="48" cy="20" r="6.5" fill="#C8553D" fill-opacity="0.14"/>
    <!-- The contact arc -->
    <path d="M44.6 19.6 Q48 16.4 51.4 19.6" stroke="#C8553D" stroke-width="1.9" fill="none" stroke-linecap="round"/>
    <!-- Two fingertip dots -->
    <circle cx="44.6" cy="19.9" r="1.55" fill="#C8553D"/>
    <circle cx="51.4" cy="19.9" r="1.55" fill="#C8553D"/>
    <!-- Tiny contact dot at the apex -->
    <circle class="bm-contact" cx="48" cy="17.6" r="1.0" fill="#FFD8C7"/>
  </g>
</svg>
