<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Signing you in — 1891 Interpreter</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#C8553D">
<link rel="icon" type="image/svg+xml" href="/interpreter/assets/img/favicon.svg">
<link rel="stylesheet" href="/interpreter/assets/css/site.css">
<link rel="stylesheet" href="/interpreter/assets/css/app.css">
</head>
<body>
<a href="#main" class="skip">Skip to main content</a>
<main id="main">
  <div class="signin-card center-text" id="card">
    <h1>Signing you in&hellip;</h1>
    <p class="lede" id="status"><span class="spinner" aria-hidden="true"></span> Verifying your one-time link.</p>
    <div id="actions" style="display:none">
      <a class="btn btn-primary btn-lg" href="/interpreter/app/">Open dashboard</a>
    </div>
    <div id="error-actions" style="display:none">
      <p class="muted">If this keeps failing, request a new link below.</p>
      <a class="btn btn-secondary" href="/interpreter/sign-in.html">Request a new sign-in link</a>
    </div>
  </div>
</main>

<script src="/interpreter/assets/js/api.js" defer></script>
<script>
window.addEventListener('DOMContentLoaded', function () {
  var params = new URLSearchParams(location.search);
  var token = params.get('token');
  var statusEl = document.getElementById('status');
  var actions = document.getElementById('actions');
  var errActions = document.getElementById('error-actions');

  function fail(msg) {
    statusEl.textContent = msg;
    statusEl.style.color = 'var(--1891int-err)';
    errActions.style.display = 'block';
  }
  function ok(user) {
    statusEl.innerHTML = 'Signed in as <strong>' + (user.email || user.user_id) + '</strong>.';
    statusEl.style.color = 'var(--1891int-ok)';
    actions.style.display = 'block';
    // Auto-forward after 1.5s
    setTimeout(function () { location.href = '/interpreter/app/'; }, 1500);
  }

  if (!token) { fail('No token in URL.'); return; }
  IntApi.authVerify(token).then(function (res) {
    if (res && res.ok && res.session) {
      IntApi.setSession(res.session);
      ok(res.user || {});
    } else {
      fail((res && res.error) || 'Unable to verify token.');
    }
  }).catch(function (err) {
    fail('Connection problem. ' + (err && err.message || ''));
  });
});
</script>
</body>
</html>
